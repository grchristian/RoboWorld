<!DOCTYPE html>
<html>
  <head>
	  <!--tipo de caracteres-->
      <meta charset="utf-8">
	  <!--para que se ajuste el tamaño de la pantalla-->
      <meta name="viewport" content="width=device-width">
	  <!--titulo de la pestaña del navegador-->
      <title>RoboWorld</title>

	  <!--para linkear con la hoja de estilos-->
      <link href="css/style.css" rel="stylesheet" type="text/css"/>
      <link rel="stylesheet" href="css/dashstyle.css">
      
	  <!--favicon (icono de la pestalla del navegador)-->
      <link rel="icon" type="image/svg+xml" href="img/fav.svg" sizes="any">
	  <!--para linkear con la libreria de jQuery en la pagina de google APIS-->
      <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
	  <!--linkear con los scripts de JS-->
      <script src="js/script.js"></script>
	  <!--linkear los iconos-->
	  <script src="https://kit.fontawesome.com/b8043ce943.js" crossorigin="anonymous"></script>
	</head>
  
  <body>
		  <!--header-->
		  <header>
			  <a class="logo" href="index.html#home"><img src="img/logo.png" alt="roboworld logo"/></a>
			  <nav>
				  	<ul class="nav-bar"><div class="bg"></div>
						<li><a class="nav-link active" href="index.html#home">HOME</a></li>
						<li><a class="nav-link" href="index.html#howtoplay">HOW TO PLAY</a></li>
						<li><a class="nav-link" href="stats.html">STATS</a></li>
						<li><a class="nav-link" href="login.html">MY ACCOUNT</a></li>
				   	</ul>
					
					<div class="hamburger">
						<div class="line1"></div>
						<div class="line2"></div>
						<div class="line3"></div>
					</div>
				</nav>
			</header>
			
			<!--aquí comienza la pagina-->
			<main>
        <!--DASHBOARD-->
				<div id="home">
          <div class="box">
            <div class="box__header">
              <h3 class="box__header-title">STATS</h3>
            </div>
            <div class="box__body">
              <div class="stats stats--main">
                <div class="stats__amount">126</div>
                <div class="stats__caption">minutes played</div>
                <div class="stats__change">
                  <div class="stats__value stats__value--positive">+6%</div>
                  <div class="stats__period">this week</div>
                </div>
              </div>
              
              <div class="stats">
                <div class="stats__amount">87359</div>
                <div class="stats__caption">collected gears</div>
                <div class="stats__change">
                  <div class="stats__value stats__value--negative">-12%</div>
                  <div class="stats__period">this week</div>
                </div>
              </div>
              
              <div class="stats">
                <div class="stats__amount">6302</div>
                <div class="stats__caption">comments</div>
                <div class="stats__change">
                  <div class="stats__value">+78</div>
                  <div class="stats__period">this week</div>
                </div>
              </div>
              
              <div class="stats">
                <div class="stats__amount">268</div>
                <div class="stats__caption">posts</div>
                <div class="stats__change">
                  <div class="stats__value">+3</div>
                  <div class="stats__period">this week</div>
                </div>
              </div>
            </div>
          </div>
          <!--DASHBOARD-->
        </main>

        <!--comienza el footer-->
        <footer class="copyright">
          <p><a href="https://github.com/grchristian/RoboWorld" target="_blank"><i class="fab fa-github"></i></a></p>
        </footer>
      </div>
      <!--el div de container (todo lo de la pagina)-->
    </body>

</html>
